<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIP BURGER | Admin Terminal</title>
    <style>
        /* Noir Premium Design Token Architecture */
        :root {
            --bg-color: #000000;
            --surface-color: #0c0c0e;
            --surface-card: #121214;
            --text-main: #ffffff;
            --text-muted: #777777;
            --border-color: #1e1e22;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .fade-in {
            animation: fadeInPage 0.6s ease-out forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Administration Header Module */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--surface-color);
        }

        .logo { font-size: 16px; font-weight: 900; letter-spacing: 3px; color: var(--text-main); }
        
        .refresh-trigger {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            padding: 10px 22px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .refresh-trigger:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        /* Workspace Grid Wrapper */
        .workspace-panel {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .section-headline {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 25px;
        }

        /* Order Identity Card Blocks */
        .order-terminal-card {
            background-color: var(--surface-card);
            border: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.3s ease;
        }
        .order-terminal-card:hover { border-color: #444444; }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .invoice-id { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

        /* Custom Selector Configuration */
        .status-dropdown {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid #333335;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            outline: none;
            cursor: pointer;
        }

        .meta-property { font-size: 13px; color: var(--text-muted); margin: 6px 0; line-height: 1.5; }
        .meta-property strong { color: #bbbbbb; font-weight: 600; }

        /* Embedded Manifest Container Box */
        .manifest-box {
            background-color: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-top: 15px;
        }
        .manifest-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .total-ledger {
            margin-top: 20px;
            text-align: right;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }
    </style>
</head>
<body class="fade-in">

    <nav>
        <div class="logo">FLIP BURGER // KITCHEN TERMINAL</div>
        <button class="refresh-trigger">SYNC DATABASE</button>
    </nav>

    <div class="workspace-panel">
        <div class="section-headline">Active Queue Manifest</div>
        
        <div class="matrix-grid" id="terminalGridTarget">
            <p style="color:var(--text-muted); font-size:14px;">Querying database records...</p>
        </div>
    </div>

</body>
</html>
