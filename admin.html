<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Burger | Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #FDF2DC;       
            --brand-brown: #541E06;     
            --accent-yellow: #FFC72C;   
            --font-bubble: 'Fredoka', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0B0A0A; /* Dark sleek professional background */
            color: #FFFFFF;
            font-family: var(--font-sans);
            padding: 40px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        h1 {
            font-family: var(--font-bubble);
            font-size: 32px;
            color: var(--accent-yellow);
            text-transform: uppercase;
        }

        .back-store-btn {
            padding: 10px 20px;
            border: 2px solid var(--accent-yellow);
            border-radius: 20px;
            color: var(--accent-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
        }

        /* --- NO ORDERS STATE --- */
        .no-orders-box {
            background-color: #1A1919;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            color: rgba(255,255,255,0.4);
        }

        /* --- ACTIVE ORDER MANAGEMENT BOARD --- */
        .order-management-card {
            background-color: #1A1919;
            border: 2px solid var(--brand-brown);
            border-radius: 24px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
        }

        .order-info-pane h2 {
            font-family: var(--font-bubble);
            font-size: 24px;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: #FFFFFF;
        }

        .meta-line {
            font-size: 15px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }
        .meta-line strong { color: var(--accent-yellow); }

        .address-block {
            background: #0B0A0A;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border-left: 4px solid var(--accent-yellow);
        }

        /* --- CONTROL PANEL CONTROLS --- */
        .order-control-pane {
            border-left: 2px solid rgba(255,255,255,0.05);
            padding-left: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .status-label {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.5px;
        }

        select class-selector {
            width: 100%;
        }

        .admin-select {
            width: 100%;
            background-color: #0B0A0A;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }
        .admin-select:focus {
            border-color: var(--accent-yellow);
        }

        .update-status-btn {
            background-color: var(--accent-yellow);
            color: var(--brand-brown);
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-family: var(--font-bubble);
            font-size: 18px;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 900;
            text-align: center;
        }
        .update-status-btn:hover { background-color: #FFFFFF; }

        @media (max-width: 768px) {
            .order-management-card { grid-template-columns: 1fr; }
            .order-control-pane { border-left: none; padding-left: 0; }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>Flip Burger Kitchen Admin</h1>
            <a href="home.html" class="back-store-btn">← Customer Store</a>
        </header>

        <main id="adminMainContent">
            </main>
    </div>

    <script>
        function loadAdminDashboard() {
            const mainContainer = document.getElementById('adminMainContent');
            const activeOrder = JSON.parse(localStorage.getItem('active_flip_order'));

            if (!activeOrder) {
                mainContainer.innerHTML = `
                    <div class="no-orders-box">
                        <h2>No Incoming Orders Available</h2>
                        <p style="margin-top: 10px;">When a client checks out from the Order Now page, their order records will sync live here.</p>
                    </div>
                `;
                return;
            }

            // Fallback default status code tracking strings safely if not set yet
            if(!activeOrder.statusId) {
                activeOrder.statusId = 1; 
            }

            mainContainer.innerHTML = `
                <div class="order-management-card">
                    <div class="order-info-pane">
                        <h2>Active Ticket: ${activeOrder.orderId}</h2>
                        <div style="margin-top: 20px;">
                            <p class="meta-line"><strong>Customer:</strong> ${activeOrder.customerName}</p>
                            <p class="meta-line"><strong>Contact Phone:</strong> ${activeOrder.customerPhone}</p>
                            <p class="meta-line"><strong>Bill Valuation:</strong> ${activeOrder.totalBill} PKR</p>
                        </div>
                        
                        <div class="address-block">
                            <p class="status-label" style="margin-bottom: 4px;">Delivery Target Destination</p>
                            <p style="font-weight: 700; color: #FFF;">${activeOrder.customerAddress}</p>
                        </div>
                    </div>

                    <div class="order-control-pane">
                        <div>
                            <p class="status-label" style="margin-bottom: 10px;">Update Order Progress Node</p>
                            <select class="admin-select" id="statusSelector">
                                <option value="1" ${activeOrder.statusId == 1 ? 'selected' : ''}>1. Order Confirmed ✓</option>
                                <option value="2" ${activeOrder.statusId == 2 ? 'selected' : ''}>2. In the Kitchen 🔥</option>
                                <option value="3" ${activeOrder.statusId == 3 ? 'selected' : ''}>3. Out for Delivery 🚲</option>
                                <option value="4" ${activeOrder.statusId == 4 ? 'selected' : ''}>4. Arrived & Enjoyed 🍔</option>
                            </select>
                        </div>

                        <button class="update-status-btn" onclick="saveAdminStatusChanges()">Publish Status Update 📡</button>
                    </div>
                </div>
            `;
        }

        function saveAdminStatusChanges() {
            const activeOrder = JSON.parse(localStorage.getItem('active_flip_order'));
            if (!activeOrder) return;

            const selector = document.getElementById('statusSelector');
            
            // Set the new manual admin chosen status integer code
            activeOrder.statusId = parseInt(selector.value);

            // Re-save the object block back down into storage
            localStorage.setItem('active_flip_order', JSON.stringify(activeOrder));
            
            alert("Order status successfully published! Your client's tracking monitor page will refresh live.");
            loadAdminDashboard();
        }

        window.onload = loadAdminDashboard;
    </script>
</body>
</html>
