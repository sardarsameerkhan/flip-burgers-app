<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIP BURGER | Track Order</title>
    <style>
        /* Noir Minimalist System */
        :root {
            --bg-color: #000000;
            --surface-color: #111111;
            --surface-card: #161616;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #222222;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Page Reveal Transitions */
        .fade-in {
            animation: fadeInPage 0.8s ease-out forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navigation Links Header */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }

        /* Centered Workspace Container */
        .search-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        h2 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        /* Search Interface Box */
        .lookup-box {
            display: flex;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            padding: 5px;
            transition: border-color 0.3s ease;
        }
        .lookup-box:focus-within { border-color: #666666; }

        .lookup-box input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 15px;
            color: var(--text-main);
            font-size: 16px;
        }
        .lookup-box input:focus { outline: none; }

        .track-btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 0 30px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease;
        }
        .track-btn:hover { background-color: #dddddd; }

        /* Tracking Result Panel card */
        .receipt-card {
            display: none;
            background-color: var(--surface-card);
            border: 1px solid var(--border-color);
            margin-top: 40px;
            padding: 35px;
            text-align: left;
            animation: fadeInPage 0.5s ease-out;
        }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .order-tag { font-size: 20px; font-weight: 800; }
        
        /* Modern Status Badge styling */
        .status-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--text-main);
            padding: 6px 14px;
            background: transparent;
        }

        .meta-line { font-size: 14px; color: var(--text-muted); margin: 8px 0; }
        .meta-line strong { color: var(--text-main); }

        .items-breakdown { margin-top: 25px; border-top: 1px dashed var(--border-color); padding-top: 20px; }
        .item-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    </style>
</head>
<body class="fade-in">

    <nav>
        <div class="logo">FLIP BURGER.</div>
        <div class="nav-links">
            <a href="home.html">HOME</a>
            <a href="menu.html">ORDER MENU</a>
            <a href="track.html" class="active">TRACK ORDER</a>
        </div>
    </nav>

    <div class="search-container">
        <h2>LIVE TRACKING</h2>
        <div class="subtitle">Enter your 4-digit system invoice code to look inside our SQLite kitchen queue.</div>

        <div class="lookup-box">
            <input type="number" id="trackingIdInput" placeholder="e.g., 1001">
            <button class="track-btn">TRACE</button>
        </div>

        <div class="receipt-card" id="trackingResultPanel">
            <div class="receipt-header">
                <span class="order-tag">INVOICE #<span id="labelOrderId">0000</span></span>
                <span class="status-badge" id="labelStatus">PENDING</span>
            </div>
            
            <div class="meta-line"><strong>Customer Profile:</strong> <span id="labelName">---</span></div>
            <div class="meta-line"><strong>Delivery / Location:</strong> <span id="labelLocation">---</span></div>
            
            <div class="items-breakdown">
                <h4 style="margin: 0 0 15px 0; font-size: 12px; letter-spacing: 1px; color:var(--text-muted);">PREPARATION DETAILS</h4>
                <div id="trackingItemsContainer"></div>
            </div>

            <hr style="border:0; border-top:1px solid var(--border-color); margin:25px 0;">
            <div style="display:flex; justify-content:between; font-weight:800; font-size:18px;">
                <span style="flex-grow:1;">TOTAL CHARGED:</span>
                <span style="color:var(--text-main);">Rs. <span id="labelTotal">0</span></span>
            </div>
        </div>
    </div>
<script>
    const MAIN_URL = "http://127.0.0.1:8000";

    async function queryTrackingData() {
        const orderIdVal = document.getElementById('trackingIdInput').value;
        const panel = document.getElementById('trackingResultPanel');

        if (!orderIdVal) {
            alert("Input an active invoice tracking registration number first.");
            return;
        }

        try {
            const fetchResult = await fetch(`${MAIN_URL}/track/${orderIdVal}`);
            
            if (fetchResult.status === 404) {
                alert("Tracking system returned negative match for that identification code.");
                panel.style.display = "none";
                return;
            }

            const activeOrderData = await fetchResult.json();

            // Distribute texts to mapped hooks
            document.getElementById('labelOrderId').innerText = activeOrderData.order_id;
            document.getElementById('labelStatus').innerText = activeOrderData.status;
            document.getElementById('labelName').innerText = activeOrderData.customer_name;
            document.getElementById('labelLocation').innerText = activeOrderData.address_or_table;
            document.getElementById('labelTotal').innerText = activeOrderData.total_bill;

            // Fluid UI Dynamic status colors architecture adjustments
            const statusBox = document.getElementById('labelStatus');
            if (activeOrderData.status === "Pending") {
                statusBox.style.borderColor = "#ffffff";
                statusBox.style.color = "#ffffff";
            } else if (activeOrderData.status === "Preparing") {
                statusBox.style.borderColor = "#888888";
                statusBox.style.color = "#888888";
            } else if (activeOrderData.status === "Completed") {
                statusBox.style.borderColor = "#28a745";
                statusBox.style.color = "#28a745";
            }

            // Loop and clear out target arrays elements cleanly
            const subContainer = document.getElementById('trackingItemsContainer');
            subContainer.innerHTML = '';
            
            activeOrderData.items.forEach(foodRow => {
                subContainer.innerHTML += `
                    <div class="item-row">
                        <span>${foodRow.name} <span style="color:var(--text-muted); font-size:12px;">x${foodRow.quantity}</span></span>
                        <span>Rs. ${foodRow.price * foodRow.quantity}</span>
                    </div>
                `;
            });

            // Reveal the card
            panel.style.display = "block";

        } catch (err) {
            alert("Error establishing active data pipeline link.");
        }
    }

    // Connect action parameters to the execution button
    document.querySelector('.track-btn').setAttribute('onclick', 'queryTrackingData()');
</script>
</body>
</html>
