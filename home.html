<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Burger | Smoky Cheesy Burger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Exact UI Color Mapping from the provided Screenshot */
        :root {
            --bg-cream: #FDF2DC;       /* The distinct retro warm cream background */
            --brand-brown: #4A1A02;     /* Deep rich chocolate brown for headers */
            --accent-yellow: #FFC72C;   /* Bright warm cheese yellow */
            --font-bubble: 'Fredoka', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--brand-brown);
            font-family: var(--font-sans);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Smooth Entrance Motion Trigger */
        .page-reveal {
            animation: clearFadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes clearFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Upper Pill Navigation Menu System */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 100px;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .brand-logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-bubble);
            font-size: 32px;
            font-weight: 700;
            color: var(--brand-brown);
            text-decoration: none;
        }

        /* Replicating the distinct minimalist vector burger icon */
        .burger-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 28px;
        }
        .burger-icon span {
            display: block;
            height: 4px;
            background-color: var(--brand-brown);
            border-radius: 2px;
        }
        .burger-icon span:first-child { border-radius: 10px 10px 2px 2px; height: 6px; }
        .burger-icon span:last-child { border-radius: 2px 2px 10px 10px; height: 5px; }

        .nav-actions {
            display: flex;
            gap: 15px;
        }

        /* Precise wireframe pill buttons styling from the screen asset */
        .pill-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border: 2px solid var(--brand-brown);
            border-radius: 30px;
            background: transparent;
            color: var(--brand-brown);
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .pill-btn:hover {
            background-color: var(--brand-brown);
            color: var(--bg-cream);
            transform: translateY(-2px);
        }

        /* --- THE HERO SCENE FRAMEWORK --- */
        .hero-view {
            position: relative;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 140px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 80px;
        }

        /* Giant Overlapping Bubble Text Layer behind the food item */
        .colossal-bg-text {
            font-family: var(--brand-brown);
            font-family: var(--font-bubble);
            font-weight: 700;
            font-size: clamp(120px, 14vw, 220px);
            line-height: 0.82;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--brand-brown);
            user-select: none;
            z-index: 1;
            max-width: 1200px;
        }

        /* Centerpiece Floating Food Asset Frame wrapper */
        .burger-hero-image-frame {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            width: 100%;
            max-width: 540px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* Floating interaction animation mimicking luxury web mechanics */
        .burger-hero-image-frame img {
            width: 100%;
            height: auto;
            object-fit: contain;
            animation: smoothFloat 4s ease-in-out infinite;
        }

        @keyframes smoothFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Bottom Yellow Swipe Block from snapshot */
        .bottom-shelf-decorator {
            width: 85%;
            max-width: 1400px;
            height: 120px;
            background-color: var(--accent-yellow);
            border-radius: 24px 24px 0 0;
            margin: 0 auto;
            border: 2px solid var(--brand-brown);
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="page-reveal">
        <nav>
            <a href="home.html" class="brand-logo-container">
                <div class="burger-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                Flip Burger
            </a>
            
            <div class="nav-actions">
                <a href="menu.html" class="pill-btn">
                    <span style="font-size: 14px;">☰</span> Menu
                </a>
                <a href="menu.html" class="pill-btn">
                    <span style="font-size: 14px;">📝</span> Order Now
                </a>
                <a href="track.html" class="pill-btn">Track Order</a>
            </div>
        </nav>

        <div class="hero-view">
            <h1 class="colossal-bg-text">
                SMOKY<br>CREAMY<br>BURGER
            </h1>

            <div class="burger-hero-image-frame">
               <img src="https://www.pngmart.com/files/16/Cheese-Burger-PNG-Photo.png" alt="Flip Burger Stack centerpiece" style="filter: drop-shadow(0 25px 40px rgba(84,30,6,0.3));">
            </div>
        </div>

        <div class="bottom-shelf-decorator"></div>
    </div>

</body>
</html>
