<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Burger | Smoky Cheesy Burger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #FDF2DC;       
            --brand-brown: #541E06;     
            --accent-yellow: #FFC72C;   
            --font-bubble: 'Fredoka', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--brand-brown);
            font-family: var(--font-sans);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* Hero Container adjustments to allow natural page scrolling down to the card */
        .page-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px 20px 60px; 
            width: 100%;
            max-width: 1600px;
        }

        .brand-logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-bubble);
            font-size: 36px;
            font-weight: 900;
            color: var(--brand-brown);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .burger-icon {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 32px;
        }
        .burger-icon span {
            display: block;
            height: 5px;
            background-color: var(--brand-brown);
            border-radius: 3px;
        }
        .burger-icon span:first-child { border-radius: 12px 12px 2px 2px; height: 8px; }
        .burger-icon span:last-child { border-radius: 2px 2px 12px 12px; height: 6px; }

        .nav-actions {
            display: flex;
            gap: 12px;
        }

        .pill-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 26px;
            border: 2px solid var(--brand-brown);
            border-radius: 30px;
            background: transparent;
            color: var(--brand-brown);
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .pill-btn:hover {
            background-color: var(--brand-brown);
            color: var(--bg-cream);
        }

        .hero-view {
            position: relative;
            width: 100%;
            max-width: 1600px;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .colossal-bg-text {
            font-family: var(--font-bubble);
            font-weight: 900;
            font-size: clamp(120px, 16vw, 240px);
            line-height: 0.78;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -4px;
            color: var(--brand-brown);
            user-select: none;
            z-index: 1;
        }

        .burger-hero-image-frame {
            position: absolute;
            top: 52%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            width: 100%;
            max-width: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .burger-hero-image-frame img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 25px 35px rgba(84,30,6,0.3));
        }

        /* --- NEW FEATURED HISTORY BLOCK SECTION --- */
        .history-card-section {
            width: 90%;
            max-width: 1400px;
            background-color: var(--accent-yellow);
            border: 3px solid var(--brand-brown);
            border-radius: 40px;
            margin: 40px auto 20px auto;
            padding: 60px 80px;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 60px;
            align-items: center;
        }

        .history-image-box {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .history-image-box img {
            width: 115%; /* Slight overflow to match the large presence of the reference picture */
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(84,30,6,0.25));
        }

        .history-content-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .history-title {
            font-family: var(--font-bubble);
            font-size: clamp(48px, 5.5vw, 76px);
            font-weight: 900;
            line-height: 0.95;
            color: var(--brand-brown);
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .history-tagline {
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 700;
            line-height: 1.4;
            color: var(--brand-brown);
            opacity: 0.95;
            max-width: 540px;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <nav>
            <a href="home.html" class="brand-logo-container">
                <div class="burger-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                Flip Burger
            </a>
            
            <div class="nav-actions">
                <a href="menu.html" class="pill-btn">☰ Menu</a>
                <a href="menu.html" class="pill-btn">📝 Order Now</a>
                <a href="track.html" class="pill-btn">Track Order</a>
            </div>
        </nav>

        <div class="hero-view">
            <h1 class="colossal-bg-text">
                SMOKY<br>CHEESY<br>BURGER
            </h1>

            <div class="burger-hero-image-frame">
                <img src="https://www.pngmart.com/files/16/Cheese-Burger-PNG-Photo.png" alt="Flip Burger Stack centerpiece">
            </div>
        </div>

        <section class="history-card-section">
            <div class="history-image-box">
                <img src="https://www.pngmart.com/files/16/Cheese-Burger-PNG-Transparent-Image.png" alt="Featured Fresh Burger Selection Element">
            </div>
            
            <div class="history-content-box">
                <h2 class="history-title">Flavor<br>That Makes<br>History!</h2>
                <p class="history-tagline">Every bite is bold, smoky, and unforgettable.</p>
            </div>
        </section>
    </div>
<script>
    // Adding minor elegant hover scaling variables to your pill buttons dynamically
    document.querySelectorAll('.pill-btn').forEach(btn => {
        btn.addEventListener('mouseenter', () => {
            btn.style.transform = 'scale(1.04) translateY(-1px)';
        });
        btn.addEventListener('mouseleave', () => {
            btn.style.transform = 'scale(1) translateY(0)';
        });
    });
</script>
</body>
</html>
