<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIP BURGER // Smashed. Flipped. Perfected.</title>
    <style>
        /* Exact Conversion: Peno Lab Design Tokens */
        :root {
            --primary-highlight: #F57C00; /* Intense Cheesy Orange */
            --bg-body: #101012; /* Deep Smoky Charcoal */
            --bg-navbar: rgba(16, 16, 18, 0.95);
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --border-ui: #2A2A2E;
            --font-stack-header: 'Arial Black', 'Helvetica Bold', sans-serif; /* Placeholder for Impact */
            --font-stack-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-stack-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Essential Entrance Animations */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal-node {
            animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* Clean Navbar System */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 80px;
            background-color: var(--bg-navbar);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-ui);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-identifier {
            font-family: var(--font-stack-header);
            font-size: 24px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 40px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
        }

        /* --- HERO MODULE --- */
        .hero-view {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            min-height: calc(100vh - 200px);
        }

        .hero-messaging {
            animation-delay: 0.1s;
        }

        .super-title {
            font-family: var(--font-stack-header);
            font-size: 110px;
            line-height: 0.9;
            letter-spacing: -5px;
            text-transform: uppercase;
            margin: 0 0 30px 0;
        }

        .super-title span {
            color: var(--primary-highlight);
        }

        .meta-description {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 550px;
            margin-bottom: 50px;
        }

        .interaction-row {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .primary-action-btn {
            padding: 22px 50px;
            background-color: var(--primary-highlight);
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s;
        }

        .primary-action-btn:hover {
            background-color: #E65100;
            transform: scale(1.05);
        }

        /* Asset/Showcase Container */
        .hero-asset-container {
            position: relative;
            animation-delay: 0.3s;
        }

        .hero-asset-shadow {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            /* Placeholder for transparent burger graphic */
        }
    </style>
</head>
<body class="reveal-node">

    <nav>
        <div class="brand-identifier">Flip Burger //</div>
        <div class="nav-links">
            <a href="home.html" class="active">HOME</a>
            <a href="menu.html">ORDER MENU</a>
            <a href="track.html">TRACK ORDER</a>
        </div>
    </nav>

    <div class="hero-view">
        <div class="hero-messaging reveal-node">
            <h1 class="super-title">Smashed.<br><span>Perfected.</span><br>Delivered.</h1>
            <p class="meta-description">Experience the definitive smashed burger culture in Gujranwala. Hand-pressed premium beef patties, melted sharp cheddar, and signature sauces coordinated via real-time logistics.</p>
            <div class="interaction-row">
                <a href="menu.html" class="primary-action-btn">ORDER CREATION</a>
            </div>
        </div>

        <div class="hero-asset-container reveal-node">
            <img src="" alt="Premium Transparent Burger Graphic Placeholder" class="hero-asset-shadow">
        </div>
    </div>

</body>
</html>
